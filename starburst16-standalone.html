<script>
"use strict";
// --- core/rng.js ---
// rng.js — the single seeded PRNG + spatial hash. ALL randomness in the library flows through here,
// so one `seed` number re-rolls every module's wear identically-reproducibly.

function mulberry32(a) {
  a = a >>> 0;
  return function () {
    a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Stable per-element hash → [0,1). Same (x, y, seed) ALWAYS yields the same value, so wear stays
// pinned to a pixel/segment across frames and re-renders.
function hash(x, y, seed = 0) {
  let n = (Math.imul(x | 0, 374761393) ^ Math.imul(y | 0, 668265263) ^ Math.imul(seed | 0, 2147483647)) | 0;
  n = Math.imul(n ^ (n >>> 13), 1274126177);
  return ((n ^ (n >>> 16)) >>> 0) / 4294967296;
}

// The helper object handed to every render(ctx, p, t, rng).
//   rng.rand()      → next value of a seeded stream (use for things that may change frame-to-frame)
//   rng.hash(x, y)  → stable value for element (x, y) under this seed (use for fixed wear)
function makeRng(seed) {
  const s = (seed >>> 0) || 0;
  const rand = mulberry32(s);
  return { seed: s, rand, hash: (x, y) => hash(x, y, s) };
}


// --- core/color.js ---
// color.js — sRGB helpers + OKLCH passthrough. Modern canvas/CSS parse oklch() natively, so for
// perceptual derivation we just emit the string and let the engine do the conversion.

function hex2rgb(h) {
  h = String(h).replace('#', '');
  if (h.length === 3) h = h.split('').map((c) => c + c).join('');
  return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
}

function rgb2hex(c) {
  return '#' + c.map((v) => Math.max(0, Math.min(255, v | 0)).toString(16).padStart(2, '0')).join('');
}

// linear sRGB interpolation. t in [0,1].
const mix = (a, b, t) => a.map((v, i) => Math.round(v + (b[i] - v) * t));

const rgba = (c, a) => `rgba(${c[0] | 0},${c[1] | 0},${c[2] | 0},${a})`;

// OKLCH string for mixing/derivation where perceptual uniformity matters.
//   l: 0..1 lightness · c: 0..~0.4 chroma · h: 0..360 hue · a: 0..1 alpha
const oklch = (l, c, h, a = 1) => `oklch(${l} ${c} ${h}${a < 1 ? ` / ${a}` : ''})`;


// --- core/contract.js ---
// contract.js — the ONE interface every display module implements, plus param resolution and the
// stage-size helper. controls.js and exporter.js read only this shape, so they stay generic.

/** @typedef {'emissive'|'reflective'|'electromechanical'|'volumetric'|'aerial'} Category */
/**
 * @typedef {Object} Param
 * @property {string} key
 * @property {string} label
 * @property {'range'|'color'|'toggle'|'select'|'text'} type
 * @property {number} [min] @property {number} [max] @property {number} [step]
 * @property {string[]} [options]   // for type 'select'
 * @property {*} default
 * @property {string} [group]       // controls panel groups by this
 */
/**
 * @typedef {Object} Display
 * @property {string} id            // MUST equal the filename stem (e.g. 'dotmatrix' → displays/dotmatrix.js)
 * @property {string} name
 * @property {Category} category
 * @property {string} physics       // one-line note on the real emission/reflection/motion
 * @property {string[]} USES        // core helper names the standalone export should inline (documentary in V1)
 * @property {Param[]} params
 * @property {Object<string,Object>} [presets]   // named partial param bundles
 * @property {(canvas:HTMLCanvasElement)=>any} [init]
 * @property {(ctx:CanvasRenderingContext2D, p:Object, t:number, rng:{seed:number,rand:()=>number,hash:(x:number,y:number)=>number})=>void} render
 * @property {()=>void} [dispose]
 */

/* ============================================================================
   RENDER CONTRACT — read this before adding a module
   ----------------------------------------------------------------------------
   • The APP sizes ctx.canvas (dpr-aware backing store) and applies the dpr transform BEFORE
     calling render. Read your logical drawing area from stageSize(ctx) → { w, h, dpr }, then
     draw within [0,w] × [0,h]. Do NOT resize the canvas yourself — center/scale your content
     into the stage so every module (and the landing mini-previews) share one frame size.
   • Paint your own background (fill the stage) — the app does not clear for you. BUT guard the opaque
     full-canvas backdrop (and any bespoke full-canvas wash/tint YOU draw) behind `if (!p.transparent)`:
     when p.transparent is true (set only during PNG export) skip them so the export keeps alpha. Off
     elements may still use the bg color for compositing — only full-canvas paints are suppressed. The
     shared overlays vignette/scanlines/ambientGradient (fx) and grain (wear) already self-suppress via
     ctx.canvas._transparent, so you do NOT guard those — only your own module-authored full-canvas fills.
   • render is a pure function of (ctx, p, t, rng):
       - route ALL wear/variance/dead-element decisions through rng.hash(x, y) so a seed re-roll
         is reproducible. Use rng.rand() only for things meant to shimmer frame-to-frame.
       - animation may use t (ms). Do not read Date.now()/Math.random() for reproducible state.
   • p carries p.seed plus every param key (resolved from defaults + overrides). presets are
     partial bundles merged over defaults.
   • Reference only your own file-scope helpers and the core utils you `import` and name in USES.
     (The standalone exporter inlines the core utils + your module source so the file runs offline.)
   ============================================================================ */

function stageSize(ctx) {
  const cv = ctx.canvas;
  const dpr = cv._dpr || 1;
  return { w: cv.width / dpr, h: cv.height / dpr, dpr };
}

// Build a fully-resolved params object from a module's schema + optional overrides. Always includes seed.
function resolveParams(mod, overrides = {}) {
  const p = { seed: 1 };
  for (const param of mod.params) p[param.key] = param.default;
  return Object.assign(p, overrides);
}


// --- core/text-raster.js ---
// text-raster.js — turn any string into a lit/unlit grid.
//   ASCII (0-9, A-Z, punctuation) → crisp built-in 5×7 font.
//   Anything else (日本語, kana, emoji, accented latin) → rasterize a web font and sample to a grid.
// Results are cached by (str, height, mode) so we don't re-rasterize every animation frame.

// 5×7 dot-matrix font — rows top→bottom, '1' = lit. (From the reference dot-matrix module.)
const F = {
  '0': ['01110', '10001', '10011', '10101', '11001', '10001', '01110'],
  '1': ['00100', '01100', '00100', '00100', '00100', '00100', '01110'],
  '2': ['01110', '10001', '00001', '00010', '00100', '01000', '11111'],
  '3': ['11111', '00010', '00100', '00010', '00001', '10001', '01110'],
  '4': ['00010', '00110', '01010', '10010', '11111', '00010', '00010'],
  '5': ['11111', '10000', '11110', '00001', '00001', '10001', '01110'],
  '6': ['00110', '01000', '10000', '11110', '10001', '10001', '01110'],
  '7': ['11111', '00001', '00010', '00100', '01000', '01000', '01000'],
  '8': ['01110', '10001', '10001', '01110', '10001', '10001', '01110'],
  '9': ['01110', '10001', '10001', '01111', '00001', '00010', '01100'],
  ':': ['00000', '00100', '00100', '00000', '00100', '00100', '00000'],
  '.': ['00000', '00000', '00000', '00000', '00000', '00000', '00100'],
  ',': ['00000', '00000', '00000', '00000', '00100', '00100', '01000'],
  '-': ['00000', '00000', '00000', '11111', '00000', '00000', '00000'],
  '+': ['00000', '00100', '00100', '11111', '00100', '00100', '00000'],
  '/': ['00001', '00010', '00010', '00100', '01000', '01000', '10000'],
  '?': ['01110', '10001', '00001', '00010', '00100', '00000', '00100'],
  '!': ['00100', '00100', '00100', '00100', '00100', '00000', '00100'],
  '°': ['01100', '10010', '01100', '00000', '00000', '00000', '00000'],
  ' ': ['00000', '00000', '00000', '00000', '00000', '00000', '00000'],
  'A': ['01110', '10001', '10001', '11111', '10001', '10001', '10001'],
  'B': ['11110', '10001', '10001', '11110', '10001', '10001', '11110'],
  'C': ['01110', '10001', '10000', '10000', '10000', '10001', '01110'],
  'D': ['11100', '10010', '10001', '10001', '10001', '10010', '11100'],
  'E': ['11111', '10000', '10000', '11110', '10000', '10000', '11111'],
  'F': ['11111', '10000', '10000', '11110', '10000', '10000', '10000'],
  'G': ['01110', '10001', '10000', '10111', '10001', '10001', '01111'],
  'H': ['10001', '10001', '10001', '11111', '10001', '10001', '10001'],
  'I': ['01110', '00100', '00100', '00100', '00100', '00100', '01110'],
  'J': ['00111', '00010', '00010', '00010', '00010', '10010', '01100'],
  'K': ['10001', '10010', '10100', '11000', '10100', '10010', '10001'],
  'L': ['10000', '10000', '10000', '10000', '10000', '10000', '11111'],
  'M': ['10001', '11011', '10101', '10101', '10001', '10001', '10001'],
  'N': ['10001', '11001', '10101', '10011', '10001', '10001', '10001'],
  'O': ['01110', '10001', '10001', '10001', '10001', '10001', '01110'],
  'P': ['11110', '10001', '10001', '11110', '10000', '10000', '10000'],
  'Q': ['01110', '10001', '10001', '10001', '10101', '10010', '01101'],
  'R': ['11110', '10001', '10001', '11110', '10100', '10010', '10001'],
  'S': ['01111', '10000', '10000', '01110', '00001', '00001', '11110'],
  'T': ['11111', '00100', '00100', '00100', '00100', '00100', '00100'],
  'U': ['10001', '10001', '10001', '10001', '10001', '10001', '01110'],
  'V': ['10001', '10001', '10001', '10001', '10001', '01010', '00100'],
  'W': ['10001', '10001', '10001', '10101', '10101', '11011', '10001'],
  'X': ['10001', '10001', '01010', '00100', '01010', '10001', '10001'],
  'Y': ['10001', '10001', '01010', '00100', '00100', '00100', '00100'],
  'Z': ['11111', '00001', '00010', '00100', '01000', '10000', '11111'],
};
const GW = 5, GH = 7, GAP = 1;

const _cache = new Map();
const inBuiltin = (str) => [...str].every((c) => F[c] || F[c.toUpperCase()]);

function builtinGrid(str) {
  const glyphs = [...str].map((c) => F[c] || F[c.toUpperCase()] || F['?']);
  const cols = glyphs.length ? glyphs.length * GW + (glyphs.length - 1) * GAP : GW;
  const grid = [];
  for (let r = 0; r < GH; r++) {
    const line = [];
    glyphs.forEach((g, gi) => {
      for (let c = 0; c < GW; c++) line.push(g[r][c] === '1' ? 1 : 0);
      if (gi < glyphs.length - 1) line.push(0);
    });
    grid.push(line);
  }
  return { grid, rows: GH, cols };
}

let _trCanvas = null;
// Rasterize arbitrary text (incl. Japanese) into a grid roughly `height` rows tall.
function rasterGrid(str, height) {
  const h = Math.max(7, height | 0);
  if (!_trCanvas) _trCanvas = document.createElement('canvas');
  const ctx = _trCanvas.getContext('2d');
  const font = `600 ${h}px "Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif`;
  ctx.font = font;
  const w = Math.max(1, Math.ceil(ctx.measureText(str).width) + 2);
  const ch = Math.ceil(h * 1.32);
  _trCanvas.width = w; _trCanvas.height = ch;
  const c2 = _trCanvas.getContext('2d');
  c2.clearRect(0, 0, w, ch);
  c2.fillStyle = '#fff'; c2.textBaseline = 'top'; c2.font = font;
  c2.fillText(str, 1, Math.floor(h * 0.12));
  const data = c2.getImageData(0, 0, w, ch).data;
  let grid = [];
  for (let y = 0; y < ch; y++) {
    const line = [];
    for (let x = 0; x < w; x++) line.push(data[(y * w + x) * 4 + 3] > 90 ? 1 : 0);
    grid.push(line);
  }
  return trim({ grid, rows: ch, cols: w });
}

// drop fully-empty border rows/cols so the glyph block sits flush (keeps interior spacing)
function trim(g) {
  let top = 0, bot = g.rows - 1, left = 0, right = g.cols - 1;
  const rowEmpty = (r) => g.grid[r].every((v) => !v);
  const colEmpty = (c) => g.grid.every((row) => !row[c]);
  while (top < bot && rowEmpty(top)) top++;
  while (bot > top && rowEmpty(bot)) bot--;
  while (left < right && colEmpty(left)) left++;
  while (right > left && colEmpty(right)) right--;
  const grid = [];
  for (let r = top; r <= bot; r++) grid.push(g.grid[r].slice(left, right + 1));
  return { grid, rows: grid.length, cols: grid[0] ? grid[0].length : 1 };
}

/**
 * textGrid(str, opts) → { grid:number[][], rows, cols }
 *   opts.mode: 'auto' (default) | 'ascii' | 'raster'
 *   opts.height: target rows for rasterized (non-ASCII) text (default 9)
 */
function textGrid(str, opts = {}) {
  const mode = opts.mode || 'auto';
  const height = opts.height || 9;
  const key = mode + '|' + height + '|' + str;
  if (_cache.has(key)) return _cache.get(key);
  let out;
  if (mode === 'ascii' || (mode === 'auto' && inBuiltin(str))) out = builtinGrid(str);
  else out = rasterGrid(str, height);
  if (_cache.size > 256) _cache.clear();
  _cache.set(key, out);
  return out;
}


// --- core/wear.js ---
// wear.js — the "lived-in" vocabulary. Reuse these instead of re-implementing wear per module.
// Every function is deterministic in the seed via rng.hash, so wear is reproducible.
// rng = { seed, rand, hash(x, y) } (from rng.js makeRng).

// per-element brightness multiplier in [1 - amount, 1]
function vary(rng, x, y, amount) {
  return 1 - amount * rng.hash(x, y);
}

// is element (x, y) a weak/dying one, at probability prob (0..1)?
function isWeak(rng, x, y, prob) {
  return rng.hash(x + 31, y + 17) < prob;
}

// scatter faint dust specks across the panel (light + dark flecks)
function dust(ctx, rng, density, w, h) {
  if (density <= 0) return;
  const n = Math.floor(density * (w * h) / 1400);
  ctx.save();
  for (let i = 0; i < n; i++) {
    const x = rng.hash(i + 1, 7) * w, y = rng.hash(i + 3, 11) * h, r = 0.4 + rng.hash(i + 5, 13) * 1.4;
    const light = rng.hash(i, 9) > 0.5;
    ctx.fillStyle = `rgba(${light ? '255,255,255' : '0,0,0'},${0.04 + rng.hash(i + 2, 4) * 0.06})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

// thin hairline scratches
function scratches(ctx, rng, count, w, h) {
  if (count <= 0) return;
  ctx.save(); ctx.lineWidth = 0.6;
  for (let i = 0; i < count; i++) {
    const x = rng.hash(i + 1, 21) * w, y = rng.hash(i + 2, 23) * h;
    const a = rng.hash(i + 3, 25) * Math.PI, len = 8 + rng.hash(i + 4, 27) * 40;
    ctx.strokeStyle = `rgba(255,255,255,${0.03 + rng.hash(i + 5, 29) * 0.05})`;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + Math.cos(a) * len, y + Math.sin(a) * len); ctx.stroke();
  }
  ctx.restore();
}

// fine luminance grain over the whole frame (cheap; coarsened by `step`)
function grain(ctx, rng, strength, w, h) {
  if (ctx.canvas._transparent || strength <= 0) return;   // full-canvas texture — skip for transparent PNG export
  const step = 3, a = strength * 0.08;
  ctx.save();
  for (let y = 0; y < h; y += step) {
    for (let x = 0; x < w; x += step) {
      const v = rng.hash((x * 0.5) | 0, ((y * 7) | 0) + ((x * 13) | 0));
      if (v > 0.6) { ctx.fillStyle = `rgba(${v > 0.8 ? '255,255,255' : '0,0,0'},${a * v})`; ctx.fillRect(x, y, step, step); }
    }
  }
  ctx.restore();
}


// --- core/fx.js ---
// fx.js — optical post-processing shared across modules.
// bloom renders a bright pass to an offscreen canvas, blurs it, and composites additively.

let _fxScratch = null;
function fxScratchCanvas(w, h) {
  if (!_fxScratch) _fxScratch = document.createElement('canvas');
  if (_fxScratch.width !== w || _fxScratch.height !== h) { _fxScratch.width = w; _fxScratch.height = h; }
  return _fxScratch;
}

// drawFn(g) paints the glow source in the SAME logical coords as ctx; we then blur + add it.
function bloom(ctx, drawFn, blur, intensity) {
  if (intensity <= 0 || blur <= 0) return;
  const cv = ctx.canvas, off = fxScratchCanvas(cv.width, cv.height), g = off.getContext('2d');
  g.setTransform(ctx.getTransform());
  g.clearRect(0, 0, cv.width, cv.height);
  drawFn(g);
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = intensity;
  ctx.filter = `blur(${blur}px)`;
  ctx.drawImage(off, 0, 0);
  ctx.restore();
  ctx.filter = 'none';
}

function vignette(ctx, w, h, amount) {
  if (ctx.canvas._transparent || amount <= 0) return;   // full-canvas darken — skip for transparent PNG export
  const g = ctx.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.25, w / 2, h / 2, Math.max(w, h) * 0.62);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, `rgba(0,0,0,${amount * 0.85})`);
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
}

function scanlines(ctx, w, h, opts) {
  const { gap = 3, alpha = 0.12 } = opts || {};
  if (ctx.canvas._transparent || alpha <= 0) return;
  ctx.save(); ctx.fillStyle = `rgba(0,0,0,${alpha})`;
  for (let y = 0; y < h; y += gap) ctx.fillRect(0, y, w, 1);
  ctx.restore();
}

// ambient light gradient for REFLECTIVE panels (flip-dot, e-ink) — lit, not emissive. angle radians.
function ambientGradient(ctx, w, h, angle, falloff) {
  if (ctx.canvas._transparent) return;
  const dx = Math.cos(angle), dy = Math.sin(angle);
  const g = ctx.createLinearGradient(w / 2 - dx * w, h / 2 - dy * h, w / 2 + dx * w, h / 2 + dy * h);
  g.addColorStop(0, `rgba(255,255,255,${0.14 * (1 - falloff)})`);
  g.addColorStop(0.5, 'rgba(255,255,255,0)');
  g.addColorStop(1, `rgba(0,0,0,${0.22 * (1 - falloff)})`);
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
}

// cheap chromatic edge: redraw the canvas shifted in R/B. px = offset in logical px.
function chromaticOffset(ctx, w, h, px) {
  if (!px) return;
  const cv = ctx.canvas;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.22;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  const dpr = cv._dpr || 1;
  ctx.drawImage(cv, px * dpr, 0);
  ctx.drawImage(cv, -px * dpr, 0);
  ctx.restore();
}

// --- displays/starburst16.js ---
// starburst16.js — 16-Segment Starburst (emissive). HANDOVER §6.04.
// Same emissive bar physics as sevenseg.js — elongated-hex bars, multi-pass glow + white hot core,
// off-segment ghost, junction bleed, per-segment variance — but with 14/16 segments (split horizontals
// + four diagonals + two center verticals) so the display is FULL ALPHANUMERIC. The real work is the
// segment GEOMETRY (SEG16) and a legible GLYPH map covering 0-9 and A-Z. A toggle drops the two center
// verticals (i & l) for the common 14-segment part. Segment bars still cannot form kanji — keep content
// alphanumeric; unknown chars render as '-'.


// 16-segment labels. Outer ring (like 7-seg but horizontals split):
//   a1 a2 = top (L,R) · d1 d2 = bottom (L,R) · b,c = right verticals (top,bottom) · f,e = left (top,bottom)
// Inner star: g1 g2 = center horizontals (L,R) · the diagonals/verticals fill the gaps:
//   h = TL->center · i = top-center vertical · j = TR->center
//   k = BL->center · l = bottom-center vertical · m = BR->center
const SEG_ALL = ['a1', 'a2', 'b', 'c', 'd1', 'd2', 'e', 'f', 'g1', 'g2', 'h', 'i', 'j', 'k', 'l', 'm'];
const CENTER_VERTS = ['i', 'l']; // dropped in 14-segment mode

// which segments light per character (uppercased on lookup). chosen for legibility on a real starburst.
const GLYPH = {
  '0': 'a1 a2 b c d1 d2 e f j k',          // slashed zero (diagonals = the slash)
  '1': 'b c',                               // two right verticals only — a 7-seg-style "1" (2 segments)
  '2': 'a1 a2 b g1 g2 e d1 d2',
  '3': 'a1 a2 b c d1 d2 g2',
  '4': 'f g1 g2 b c',
  '5': 'a1 a2 f g1 g2 c d1 d2',
  '6': 'a1 a2 f g1 g2 e c d1 d2',
  '7': 'a1 a2 b c',
  '8': 'a1 a2 b c d1 d2 e f g1 g2',
  '9': 'a1 a2 b c d1 d2 f g1 g2',
  'A': 'a1 a2 b c e f g1 g2',
  'B': 'a1 a2 b c d1 d2 g2 i l',            // verticals split the closed loop
  'C': 'a1 a2 f e d1 d2',
  'D': 'a1 a2 b c d1 d2 i l',
  'E': 'a1 a2 f e g1 d1 d2',
  'F': 'a1 a2 f e g1',
  'G': 'a1 a2 f e c d1 d2 g2',
  'H': 'b c e f g1 g2',
  'I': 'a1 a2 d1 d2 i l',
  'J': 'b c d1 d2 e',
  'K': 'f e g1 j m',                        // arms via diagonals
  'L': 'f e d1 d2',
  'M': 'b c e f h j',                        // outer verts + two top diagonals
  'N': 'b c e f h m',                        // verts + TL & BR diagonals
  'O': 'a1 a2 b c d1 d2 e f',
  'P': 'a1 a2 b f e g1 g2',
  'Q': 'a1 a2 b c d1 d2 e f m',             // O with a tail
  'R': 'a1 a2 b f e g1 g2 m',               // P with a diagonal leg
  'S': 'a1 a2 f g1 g2 c d1 d2',
  'T': 'a1 a2 i l',                         // top bar + center mast
  'U': 'b c d1 d2 e f',
  'V': 'f e k j',                           // left verts + two diagonals meeting low
  'W': 'b c e f k m',                       // verts + two bottom diagonals
  'X': 'h j k m',                           // pure diagonal cross
  'Y': 'h j l',                             // upper diagonals into the center mast
  'Z': 'a1 a2 j k d1 d2',                   // top + diagonal + bottom
  '-': 'g1 g2', '_': 'd1 d2', '=': 'g1 g2 d1 d2', '+': 'g1 g2 i l',
  '/': 'j k', '\\': 'h m', '*': 'g1 g2 h i j k l m', '°': 'a1 a2 b f g1 g2', ' ': '',
};

// segment endpoints inside a w×h box, bar thickness t. mirrors sevenseg's segEnds but for 16 cells.
function SEG16(seg, w, h, t) {
  const ht = t / 2, hw = w / 2, hh = h / 2;
  switch (seg) {
    case 'a1': return [t, ht, hw, ht];
    case 'a2': return [hw, ht, w - t, ht];
    case 'b': return [w - ht, t, w - ht, hh - ht];
    case 'c': return [w - ht, hh + ht, w - ht, h - t];
    case 'd1': return [t, h - ht, hw, h - ht];
    case 'd2': return [hw, h - ht, w - t, h - ht];
    case 'e': return [ht, hh + ht, ht, h - t];
    case 'f': return [ht, t, ht, hh - ht];
    case 'g1': return [t, hh, hw, hh];
    case 'g2': return [hw, hh, w - t, hh];
    case 'h': return [ht + t, t + ht, hw - ht, hh - ht];     // TL -> center
    case 'i': return [hw, t, hw, hh - ht];                    // top-center vertical
    case 'j': return [w - ht - t, t + ht, hw + ht, hh - ht];  // TR -> center
    case 'k': return [ht + t, h - t - ht, hw - ht, hh + ht];  // BL -> center
    case 'l': return [hw, hh + ht, hw, h - t];                // bottom-center vertical
    case 'm': return [w - ht - t, h - t - ht, hw + ht, hh + ht]; // BR -> center
  }
  return [0, 0, 0, 0];
}

// elongated hex (rounded-tip bar) path between two points — identical idiom to sevenseg.vhex.
function vhex(ctx, x1, y1, x2, y2, th) {
  const dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy);
  if (len < 0.001) return;
  const ux = dx / len, uy = dy / len, px = -uy, py = ux, h = th / 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x1 + ux * h - px * h, y1 + uy * h - py * h);
  ctx.lineTo(x2 - ux * h - px * h, y2 - uy * h - py * h);
  ctx.lineTo(x2, y2);
  ctx.lineTo(x2 - ux * h + px * h, y2 - uy * h + py * h);
  ctx.lineTo(x1 + ux * h + px * h, y1 + uy * h + py * h);
  ctx.closePath();
}

// split a glyph string into a Set of segment labels. unknown -> '-'.
function segsFor(ch, has16) {
  const key = GLYPH[ch] != null ? ch : '-';
  let list = GLYPH[key].split(' ').filter(Boolean);
  if (!has16) list = list.filter((s) => CENTER_VERTS.indexOf(s) < 0);
  return new Set(list);
}

function parse(str) {
  const toks = [];
  for (const ch of String(str)) {
    if (ch === '.') { const last = toks[toks.length - 1]; if (last && !last.dp) { last.dp = true; continue; } }
    toks.push({ ch: ch === ' ' ? ' ' : ch.toUpperCase(), dp: false });
  }
  return toks.length ? toks : [{ ch: ' ', dp: false }];
}

const __MOD__ = {
  id: 'starburst16',
  name: '16-Segment Starburst',
  category: 'emissive',
  physics: 'Emissive bar segments like a VFD/LED 7-seg, but 14/16 bars (split horizontals + four diagonals + two center verts) for full alphanumeric: hex bars, multi-pass glow + white hot core, off-segment ghost, junction bleed, per-segment variance. Segment bars cannot form kanji — content is alphanumeric.',
  USES: ['stageSize', 'vignette', 'hex2rgb', 'rgba'],
  params: [
    { key: 'text', label: 'text', type: 'text', max: 16, default: '16 SEGMENTS', group: 'content' },
    { key: 'source', label: 'source', type: 'select', options: ['text', 'clock'], default: 'text', group: 'content' },
    { key: 'seg16', label: '16 segments', type: 'toggle', default: true, group: 'content' },
    { key: 'color', label: 'segment', type: 'color', default: '#ffb000', group: 'color' },
    { key: 'bg', label: 'background', type: 'color', default: '#0c0702', group: 'color' },
    { key: 'thickness', label: 'bar width', type: 'range', min: 6, max: 22, step: 1, default: 13, group: 'geometry' },
    { key: 'gap', label: 'char gap', type: 'range', min: 10, max: 55, step: 1, default: 30, group: 'geometry' },
    { key: 'glow', label: 'glow', type: 'range', min: 0, max: 34, step: 1, default: 15, group: 'glow' },
    { key: 'coreWhite', label: 'hot core', type: 'range', min: 0, max: 100, step: 1, default: 78, group: 'glow' },
    { key: 'coreThick', label: 'core width', type: 'range', min: 20, max: 90, step: 1, default: 54, group: 'glow' },
    { key: 'ghost', label: 'ghost all-on', type: 'range', min: 0, max: 30, step: 1, default: 5, group: 'wear' },
    { key: 'bleed', label: 'junction bleed', type: 'range', min: 0, max: 100, step: 1, default: 34, group: 'wear' },
    { key: 'variance', label: 'seg variance', type: 'range', min: 0, max: 100, step: 1, default: 22, group: 'wear' },
    { key: 'dimSeg', label: 'dim segment', type: 'select', options: ['none', ...SEG_ALL], default: 'h', group: 'wear' },
    { key: 'vignette', label: 'vignette', type: 'range', min: 0, max: 100, step: 1, default: 40, group: 'wear' },
  ],
  presets: {
    Amber: { color: '#ffb000', bg: '#0c0702', seg16: true, thickness: 13, glow: 15, coreWhite: 78, coreThick: 54, ghost: 5, bleed: 34, variance: 22, dimSeg: 'h', vignette: 40 },
    Cyan: { color: '#1bf0c8', bg: '#04100e', seg16: true, thickness: 12, glow: 17, coreWhite: 88, coreThick: 56, ghost: 6, bleed: 30, variance: 24, dimSeg: 'k', vignette: 36 },
    'Depot 14': { color: '#ff5a1f', bg: '#0a0402', seg16: false, thickness: 15, glow: 13, coreWhite: 36, coreThick: 50, ghost: 8, bleed: 40, variance: 34, dimSeg: 'e', vignette: 50 },
    Clean: { color: '#bfeaff', bg: '#03080c', seg16: true, thickness: 10, glow: 7, coreWhite: 66, coreThick: 60, ghost: 2, bleed: 10, variance: 5, dimSeg: 'none', vignette: 18 },
  },

  render(ctx, p, t, rng) {
    const { w, h } = stageSize(ctx);
    const segColor = p.color, has16 = !!p.seg16;
    if (!p.transparent) { ctx.fillStyle = rgba(hex2rgb(p.bg), 1); ctx.fillRect(0, 0, w, h); }

    let str = p.text || ' ';
    if (p.source === 'clock') {
      const d = new Date(), z = (n) => String(n).padStart(2, '0');
      str = z(d.getHours()) + z(d.getMinutes()) + z(d.getSeconds());
    }
    const tokens = parse(str);
    const n = tokens.length;

    // fit-to-stage: digit box aspect like sevenseg, scale down if the row overflows the padded width.
    const aspect = 1.55, pad = Math.min(w, h) * 0.14, gapFrac = p.gap / 100;
    let dh = h - pad * 2, dw = dh / aspect, gp = dw * gapFrac;
    let tw = dw * n + gp * (n - 1);
    const maxW = w - pad * 2;
    if (tw > maxW) { const s = maxW / tw; dw *= s; dh *= s; gp = dw * gapFrac; tw = dw * n + gp * (n - 1); }
    const th = dw * (p.thickness / 100);
    const ghostA = p.ghost / 100, varA = p.variance / 100, dim = p.dimSeg, coreW = p.coreWhite / 100;
    let x = (w - tw) / 2;
    const y = (h - dh) / 2;

    // one segment bar: off -> faint ghost; on -> glow pass, junction bleed, solid, white hot core.
    const drawSeg = (x1, y1, x2, y2, bright, on) => {
      if (!on) {
        if (ghostA <= 0) return;
        ctx.shadowBlur = 0; ctx.globalAlpha = ghostA; ctx.fillStyle = segColor;
        vhex(ctx, x1, y1, x2, y2, th * 0.9); ctx.fill(); ctx.globalAlpha = 1;
        return;
      }
      ctx.fillStyle = segColor; ctx.shadowColor = segColor;
      vhex(ctx, x1, y1, x2, y2, th);
      ctx.globalAlpha = 0.55 * bright; ctx.shadowBlur = p.glow; ctx.fill();                         // glow pass
      if (p.bleed > 0) { ctx.globalAlpha = 0.16 * (p.bleed / 100) * bright; ctx.shadowBlur = p.glow * (1 + p.bleed / 60); ctx.fill(); } // junction bleed
      ctx.globalAlpha = Math.min(1, bright); ctx.shadowBlur = 0; ctx.fill();                        // solid
      if (coreW > 0) {
        ctx.globalAlpha = Math.min(1, coreW * bright); ctx.fillStyle = '#fff';
        vhex(ctx, x1, y1, x2, y2, th * (p.coreThick / 100)); ctx.fill();
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    };

    for (let ti = 0; ti < n; ti++) {
      const tk = tokens[ti];
      const on = segsFor(tk.ch, has16);
      ctx.save(); ctx.translate(x, y);
      for (let i = 0; i < SEG_ALL.length; i++) {
        const seg = SEG_ALL[i];
        if (!has16 && CENTER_VERTS.indexOf(seg) >= 0) continue; // 14-seg: skip i & l entirely
        const [x1, y1, x2, y2] = SEG16(seg, dw, dh, th);
        let bright = 1 - varA * rng.hash(ti * 17 + i, 5);
        if (seg === dim) bright *= 0.34;
        drawSeg(x1, y1, x2, y2, Math.max(0.12, bright), on.has(seg));
      }
      if (tk.dp) { // decimal point: a lit dot at the bottom-right corner
        const r = th * 0.6;
        ctx.fillStyle = segColor; ctx.shadowColor = segColor; ctx.shadowBlur = p.glow;
        ctx.beginPath(); ctx.arc(dw - r, dh - r, r, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.globalAlpha = coreW;
        ctx.beginPath(); ctx.arc(dw - r, dh - r, r * 0.5, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
      }
      ctx.restore();
      x += dw + gp;
    }

    ctx.shadowBlur = 0;
    vignette(ctx, w, h, p.vignette / 100);
  },
};

(function () {
  var P = {"seed":1,"text":"16 SEGMENTS","source":"text","seg16":true,"color":"#ffb000","bg":"#0c0702","thickness":13,"gap":30,"glow":15,"coreWhite":78,"coreThick":54,"ghost":5,"bleed":34,"variance":22,"dimSeg":"h","vignette":40};
  var cv = document.getElementById('s'), ctx = cv.getContext('2d');
  function size() {
    var r = cv.getBoundingClientRect(), dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    cv.width = Math.round(r.width * dpr); cv.height = Math.round(r.height * dpr);
    cv._dpr = dpr; ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', size); size();
  function frame(t) {
    ctx.setTransform(cv._dpr, 0, 0, cv._dpr, 0, 0);
    __MOD__.render(ctx, P, t, makeRng(P.seed));
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
