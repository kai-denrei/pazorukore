<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#08080a">
  <meta name="cb" content="32d1771a">
  <title>PazoruKore — パズルコア</title>
  <link rel="manifest" href="manifest.json?v=32d1771a">
  <!-- パ brand favicon (the project logo) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2308080a'/%3E%3Ctext x='32' y='46' font-size='42' text-anchor='middle' fill='%2300e5d0' font-family='sans-serif'%3E%E3%83%91%3C/text%3E%3C/svg%3E">

  <!-- iOS PWA / installability (mobile-pwa skill) -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png?v=32d1771a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PazoruKore">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css?v=32d1771a">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body data-skin="futuristic" data-game="shikaku">

  <!-- ── App chrome (house identity; NOT themed by skins, §13) ───────────────── -->
  <header id="chrome" class="chrome">
    <div class="brand">
      <span class="brand-logo" aria-hidden="true">パ</span>
      <span class="brand-name">PazoruKore</span>
      <!-- 3-glyph build/version indicator (cache-busting), injected by version-badge.js -->
      <span id="version-glyphs" class="version-glyphs" title="build version" aria-label="build version"></span>
    </div>
    <canvas id="timer-canvas" class="timer-clock" role="timer" aria-label="elapsed time"></canvas>
    <nav class="chrome-actions">
      <button id="btn-pipeline" class="chrome-btn" type="button" title="Pipeline / roadmap" aria-label="Pipeline and roadmap">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="6" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="12" r="2"/>
          <path d="M8 6h6a2 2 0 0 1 2 2v2M8 18h6a2 2 0 0 0 2-2v0"/>
        </svg>
      </button>
      <button id="btn-rules" class="chrome-btn" type="button" title="How to play — rules for this game" aria-label="Rules for this game">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/><path d="M12 16v-5"/><circle cx="12" cy="7.5" r="0.6" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <button id="btn-menu" class="chrome-btn" type="button" title="Menu — game, skin, tune, about" aria-label="Menu">▦</button>
    </nav>
  </header>

  <!-- Game-mode rail: one big katakana glyph per game (ス シ ブ マ フ …), tap to switch -->
  <nav id="game-rail" class="game-rail" aria-label="Game mode"></nav>

  <!-- HUD row under the timer: score · larger New button · run progress -->
  <div class="hud-row">
    <div class="score-block">
      <span class="score-num" id="score-num">0</span>
      <span class="score-lbl" id="score-lbl">SCORE</span>
    </div>
    <div class="action-wrap">
      <button id="btn-action" class="action-btn" type="button" title="Start / New" aria-label="Start">
        <canvas id="action-canvas" class="action-canvas"></canvas>
      </button>
      <!-- combo callout (DABURU! …) — anchored just under the action button, not over the board -->
      <div id="streak-flash" class="streak-flash" hidden></div>
    </div>
    <div class="run-block">
      <span class="run-prog" id="run-prog">1<span class="run-sep">/</span>10</span>
      <span class="run-best" id="run-best">★ 0</span>
    </div>
  </div>

  <!-- ── Play surface ─────────────────────────────────────────────────────────── -->
  <main id="stage" class="stage">
    <div id="board-wrap" class="board-wrap">
      <div id="board" class="board" role="grid" aria-label="Puzzle board"><!-- cells + glyph canvas injected by board.js --></div>
      <div id="hud" class="hud" aria-live="polite"></div>
    </div>
    <div id="controls" class="controls"><!-- numpad / undo-redo / dimension HUD injected by controls.js --></div>
  </main>

  <!-- ── Overlays (built lazily by ui modules) ────────────────────────────────── -->
  <div id="picker" class="overlay" hidden></div>
  <div id="rules" class="overlay" hidden></div>
  <div id="pipeline" class="overlay" hidden></div>
  <div id="settings" class="overlay" hidden></div>
  <div id="about" class="overlay" hidden></div>
  <aside id="admin" class="admin-panel" hidden aria-label="Skin tuning panel"></aside>

  <!-- flawless-run / streak-10 full-screen overlay (effects adapted from KikaCentroid) -->
  <div id="perfect-overlay" class="perfect-overlay" hidden>
    <div class="perfect-overlay-card">
      <p class="perfect-overlay-title" id="po-title">完璧!</p>
      <p class="perfect-overlay-sub" id="po-sub">PĀFEKUTO RUN · 10 / 10</p>
    </div>
  </div>

  <!-- PWA: install hint (Chrome/Android beforeinstallprompt or iOS A2HS) + update toast -->
  <div id="install-hint" class="pwa-toast" hidden></div>
  <div id="sw-toast" class="pwa-toast" hidden></div>

  <script type="module" src="src/ui/app.js?v=32d1771a"></script>
</body>
</html>
